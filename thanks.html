<title>Thanks | 38n</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F8F7F4;
    --text: #1C1C1C;
    --sub: #6B6B6B;
    --accent: #4A7C7E;
    --border: #DDDBD6;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    line-height: 1.8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .thanks {
    max-width: 480px;
    padding: 48px;
    text-align: center;
  }

  .thanks h1 {
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    font-size: 1.3rem;
    letter-spacing: 0.2em;
    margin-bottom: 24px;
  }

  .thanks p {
    font-size: 0.9rem;
    color: var(--sub);
    margin-bottom: 40px;
  }

  .thanks a {
    font-size: 0.72rem;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.15em;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 4px;
  }
</style>
</head>
